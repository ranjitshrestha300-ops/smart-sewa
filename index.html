<body>

    <!-- हेडर सेक्सन -->
    <header>
        <div class="nav-wrapper">
            <a href="index.html" class="brand-master-logo">

                </div>
                <div class="brand-typography-block">
                    <div class="brand-main-title">Smart<span>Sewa</span></div>
                    <div class="brand-sub-tag">Nepal Hub</div>
                </div>
            </a>
            <nav>
                <ul>
                    <li><a href="pages/accessories.html">Accessories</a></li>
                    <li><a href="pages/vlog-gaming.html">Vlog & Gaming</a></li>

    <!-- 🚀 अटोमेटिक अपडेट टिकर सेक्सन -->
    <div class="premium-vertical-ticker">
        <div class="ticker-badge"><i class="fa-solid fa-bolt"></i> Updates</div>
        <div class="ticker-viewport">
            <!-- जाभास्क्रिप्टले यसभित्र अटोमेटिक डाटाहरू थपिदिनेछ -->
            <ul class="ticker-list" id="auto-live-ticker">
                <li><i class="fa-solid fa-sync fa-spin"></i> पछिल्लो नयाँ अपडेटहरू लोड हुँदैछन्...</li>
            </ul>
        </div>
    </div>

    <!-- मुख्य ग्रिड फिड -->
    <div class="main-wrapper">
        <!-- भर्खरका नयाँ पोष्टहरू (LATEST UPDATES) SECTION -->
        <div id="dynamic-posts-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px;">
            <!-- मुख्य पोष्टहरू यहाँ अटोमेटिक लोड हुन्छन् -->
        </div>
    </div>

    <!-- फुटर सेक्सन -->
    <footer>
        <div class="footer-nav-links">
            <a href="pages/accessories.html">Accessories</a> | 
            <a href="pages/vlog-gaming.html">Vlog & Gaming</a> | 
            <a href="pages/insurance-post1.html">Insurance plans</a> |
            <a href="pages/gallery.html">Photo Gallery</a>
        </div>
        <p>© 2026 Smart Sewa Nepal. All Rights Reserved.</p>
    </footer>

    <!-- 🛠️ जाभास्क्रिप्ट कोड: टिकर र ग्रिड दुवैलाई अटोमेटिक बनाउने -->
    <script>
        fetch('posts.json')
            .then(response => response.json())
            .then(data => {
                // १. टिकर (Updates) लाई अटोमेटिक बनाउने भाग
                const tickerList = document.getElementById('auto-live-ticker');
                if (tickerList && data.length > 0) {
                    tickerList.innerHTML = ''; // पुरानो टेक्स्ट फाल्ने
                    
                    // सबैभन्दा नयाँ ३ वटा पोष्टहरू निकाल्ने (Reverse गरेर)
                    const recentUpdates = [...data].reverse().slice(0, 3);
                    
                    recentUpdates.forEach(post => {
                        const li = document.createElement('li');
                        li.innerHTML = `<i class="fa-solid fa-circle-check"></i> <a href="pages/${post.link}" style="color: inherit; text-decoration: none;">${post.title}</a>`;
                        tickerList.appendChild(li);
                    });
                }

                // २. मुख्य ग्रिड फिड लोड गराउने भाग
                const gridContainer = document.getElementById('dynamic-posts-grid');
                if (gridContainer && data.length > 0) {
                    gridContainer.innerHTML = '';
                    
                    [...data].reverse().forEach(post => {
                        const card = document.createElement('div');
                        card.className = 'insurance-post-card';
                        card.style.background = '#ffffff';
                        card.style.border = '1px solid #e2e8f0';
                        card.style.borderRadius = '12px';
                        card.style.overflow = 'hidden';
                        card.style.display = 'flex';
                        card.style.flexDirection = 'column';

                        card.innerHTML = `
                            <img src="${post.image}" onerror="this.src='https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=400'" style="width: 100%; height: 180px; object-fit: cover;">
                            <div style="padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;">
                                <div>
                                    <span style="font-size: 12px; color: #64748b; font-weight: bold;">${post.date} | ${post.category}</span>
                                    <h3 style="font-size: 18px; color: #0f172a; margin: 10px 0 20px 0; font-weight: 700; line-height: 1.4;">${post.title}</h3>
                                </div>
                                <a href="pages/${post.link}" style="background: #f59e0b; color: #fff; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px;">Read Full Article</a>
                            </div>
                        `;
                        gridContainer.appendChild(card);
                    });
                }
            })
            .catch(error => console.error('Error loading dynamic data:', error));
    </script>

</body>
